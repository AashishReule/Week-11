<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aashish Reule - Portfolio</title>
    <style>
        /* Base styles */
        body {
            font-family: Arial, sans-serif;
            transition: background-color 0.4s, color 0.4s;
            padding: 40px;
            background-color: #ffffff;
            color: #000000;
        }

        /* Dark mode styles */
        body.dark-mode {
            background-color: #121212;
            color: #ffffff;
        }

        #darkModeToggle {
            padding: 12px 24px;
            margin-top: 30px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            border: 2px solid #333;
            border-radius: 8px;
            background-color: #f0f0f0;
            color: #333;
            transition: all 0.3s;
        }

        body.dark-mode #darkModeToggle {
            background-color: #333;
            color: #fff;
            border-color: #555;
        }

        #darkModeToggle:hover {
            opacity: 0.8;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <h1>Aashish Reule</h1>
    <p>Computer Engineering Student | Seoul Theological University</p>
    <p>Student ID: 2026300005</p>

    <!-- Dark Mode Button -->
    <button id="darkModeToggle">Dark Mode</button>

    <script src="script.js"></script>
</body>
</html>
